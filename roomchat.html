<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEA Chat Room | RE-OCEAN</title>
  <link rel="stylesheet" href="css/global.css?v=9">
  <link rel="stylesheet" href="css/ai.css?v=9">
  <style>
    body { background: var(--bg-main); overflow: hidden; }
    .chat-room-layout {
      display: flex; height: 100vh;
      padding-top: var(--nav-height);
    }
    .chat-room-sidebar {
      width: 260px; background: rgba(255,255,255,0.7);
      border-right: 1px solid rgba(0,0,0,0.05);
      padding: 24px 16px;
      display: flex; flex-direction: column;
    }
    .chat-room-main {
      flex: 1; display: flex; flex-direction: column;
      background: #fff;
      position: relative;
    }
    .chat-room-header {
      padding: 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
    }
    .chat-area {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .chat-input-wrapper {
      padding: 20px 24px; border-top: 1px solid rgba(0,0,0,0.05);
      background: #fff;
    }
    /* Messages */
    .msg-row { display: flex; gap: 16px; max-width: 800px; margin: 0 auto; width: 100%; }
    .msg-user { flex-direction: row-reverse; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; }
    .msg-user .msg-avatar { background: var(--navy-800); }
    .msg-bubble { background: #f0f4f8; padding: 14px 18px; border-radius: 18px; border-top-left-radius: 4px; font-size: 0.95rem; line-height: 1.6; color: var(--navy-900); }
    .msg-user .msg-bubble { background: var(--primary); color: #fff; border-radius: 18px; border-top-right-radius: 4px; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-mark">
          <svg viewBox="0 0 24 24"><path d="M2 12s3-4 6-4 6 4 6 4 3 4 6 4"/><path d="M2 18s3-4 6-4 6 4 6 4 3 4 6 4"/></svg>
        </div>
        <span class="nav-logo-text">RE<span class="dot">·</span>OCEAN</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html" class="nav-link">Beranda</a></li>
        <li><a href="lokasi.html" class="nav-link">Lokasi</a></li>
        <li><a href="marketplace.html" class="nav-link">Marketplace</a></li>
        <li><a href="ai-assistant.html" class="nav-link active">SEA</a></li>
      </ul>
      <div class="nav-actions">
        <a href="ai-assistant.html" class="btn-nav-login">Kembali</a>
      </div>
    </div>
  </nav>

  <div class="chat-room-layout">
    <div class="chat-room-sidebar">
      <button class="new-chat-btn" onclick="window.location.reload()">
        + Percakapan Baru
      </button>
      <div style="margin-top:24px; font-size:0.8rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Riwayat</div>
      <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
        <div style="padding:10px 12px; background:rgba(0,0,0,0.03); border-radius:8px; font-size:0.85rem; cursor:pointer;">Proses Ekstraksi Kolagen...</div>
        <div style="padding:10px 12px; font-size:0.85rem; color:var(--text-body); cursor:pointer;">Analisis Pasar Limbah Ikan...</div>
      </div>
    </div>

    <div class="chat-room-main">
      <div class="chat-room-header">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:10px; height:10px; background:#10b981; border-radius:50%;"></div>
          <span style="font-weight:600; color:var(--navy-900);">Sesi Baru dengan SEA</span>
        </div>
      </div>
      
      <div class="chat-area" id="chat-area">
        <div class="msg-row">
          <div class="msg-avatar">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="msg-bubble">Halo! Saya SEA, asisten cerdas Anda. Ada yang bisa saya bantu hari ini mengenai RE-OCEAN atau pengolahan limbah?</div>
        </div>
      </div>

      <div class="chat-input-wrapper">
        <div style="max-width:800px; margin:0 auto; position:relative;">
          <textarea class="ai-textarea" id="chat-input" placeholder="Tulis pesan..." rows="1" style="width:100%; padding:16px 50px 16px 20px; border-radius:24px; border:1px solid #ddd; outline:none; resize:none;"></textarea>
          <button id="send-btn" style="position:absolute; right:12px; bottom:12px; width:32px; height:32px; background:var(--primary); color:#fff; border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const input = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    const area = document.getElementById('chat-area');

    btn.addEventListener('click', () => {
      if (!input.value.trim()) return;
      
      // User message
      const text = input.value;
      input.value = '';
      
      const userHtml = `
        <div class="msg-row msg-user">
          <div class="msg-avatar">U</div>
          <div class="msg-bubble">${text}</div>
        </div>
      `;
      area.insertAdjacentHTML('beforeend', userHtml);
      area.scrollTop = area.scrollHeight;

      // Bot reply
      setTimeout(() => {
        const botHtml = `
          <div class="msg-row">
            <div class="msg-avatar">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="msg-bubble">Maaf, saya dalam mode demonstrasi. Untuk pertanyaan nyata, fitur NLP sedang dikembangkan oleh tim RE-OCEAN.</div>
          </div>
        `;
        area.insertAdjacentHTML('beforeend', botHtml);
        area.scrollTop = area.scrollHeight;
      }, 1000);
    });

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        btn.click();
      }
    });
  </script>
</body>
</html>
